name: Update Google Scholar metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch Google Scholar metrics
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python .github/scripts/update_scholar_metrics.py

      - name: Commit updated metrics
        run: |
          if git diff --quiet -- scholar-metrics.json; then
            echo "Scholar metrics are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar-metrics.json
          git commit -m "chore: update Google Scholar metrics"
          git push
